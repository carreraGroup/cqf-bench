name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install PyYAML
      - name: Compile Python
        run: python -m compileall scripts
      - name: Validate folder-based scenarios
        run: scripts/validate_scenarios.py --suite bench/scenarios/tpcqf/suite.yaml
