# Example engine config (template).
#
# This template lists the two engines CQF Bench documents with concrete setup:
# - hapi-cqf-ruler-local — public Docker image (Alphora CQF Ruler); default
#   for GETTING_STARTED and smoke runs.
# - mercury-local — local Mercury benchmark image; ships disabled until you
#   build `mercury-cqf-bench:latest` and set `disabled: false`.
#
# For any other FHIR CQF endpoint, copy this file to `local.engines.yaml` and add
# a block (often with `adapter: generic-cqf`); see docs under "Add an engine".
#
# Copy to bench/config/local.engines.yaml and edit for your environment.
engines:
- name: hapi-cqf-ruler-local
  adapter: hapi-cqf-ruler
  base_url: http://localhost:8081
  cqf_base_path: /fhir
  data_base_path: /fhir
  fhir_base_path: /fhir
  headers: {}
  capabilities:
  - resident_data_load
  - resident_execute
  - system_cql
  - inline_bundle_execute
  docker:
    enabled: true
    image: alphora/cqf-ruler:latest
    container_name: hapi-cqf-ruler
    host_port: 8081
    container_port: 8080
    cpus: 4.0
    mem_limit: 8g
    cpuset: "0-3"
    env:
      hapi.fhir.cql_enabled: 'true'
    health_path: /fhir/metadata
- name: mercury-local
  adapter: mercury-cqf
  base_url: http://localhost:8080
  cqf_base_path: /cqf
  data_base_path: /api
  fhir_base_path: /fhir
  headers: {}
  capabilities:
  - inline_bundle_execute
  - resident_data_load
  - resident_execute
  - system_cql
  - library_write_once_execute_many
  disabled: true
  disabled_reason: Requires a local/private Mercury benchmark image (mercury-cqf-bench:latest);
    not publicly pullable.
  docker:
    enabled: true
    image: mercury-cqf-bench:latest
    local_image_only: true
    pull_on_bootstrap: false
    container_name: mercury-cqf-bench
    host_port: 8080
    container_port: 8080
    cpus: 4.0
    mem_limit: 8g
    cpuset: "0-3"
    env: {}
    health_path: /cqf/metadata
