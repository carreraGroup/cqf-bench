suite_id: Condition-Index-AB-ELM-Dense-WithIdVariants
description: A/B compare code-filtered vs unfiltered Condition retrieve with many
  non-matching conditions per patient Includes C10B/C20B id-scoped Library evaluate
  variants.
defaults:
  timeout_seconds: 30
  concurrency: 16
  warmup_requests: 5
  requests_per_patient: 1
scenarios:
