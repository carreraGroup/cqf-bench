when_status_in:
- 200
validators:
- type: not_operation_outcome_error
- type: min_items
  path: $.parameter[?(@.name=='SortedConditionIds')].part[*]
  alt_paths:
  - $.parameter[?(@.name=='SortedConditionIds')]
  min: 40
- type: response_regex
  pattern: cond-[A-Za-z0-9]+-m-0.*cond-[A-Za-z0-9]+-n-0
