name: cqf-bench

networks:
  cqf-bench:
    name: cqf-bench

services:
  mercury-v1:
    container_name: mercury-v1-cqf-bench
    image: mercury-v1-cqf-bench:latest
    ports:
      - "8080:8080"
    cpus: 4.0
    mem_limit: 8g
    cpuset: "0-3"
    networks:
      - cqf-bench

  mercury-v2:
    container_name: mercury-v2-cqf-bench
    image: mercury-v2:dev
    ports:
      - "8082:8080"
    cpus: 4.0
    mem_limit: 8g
    cpuset: "0-3"
    networks:
      - cqf-bench

  hapi-cqf-ruler:
    container_name: hapi-cqf-ruler
    image: alphora/cqf-ruler:latest
    pull_policy: always
    environment:
      hapi.fhir.cql_enabled: "true"
    ports:
      - "8081:8080"
    cpus: 4.0
    mem_limit: 8g
    cpuset: "0-3"
    networks:
      - cqf-bench
